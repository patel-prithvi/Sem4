<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let obj= JSON.parse('{"var1":"LJ", "var2":"Univarsity"}')
        console.log(obj);
        console.log(obj.var1);
        let obj2= JSON.stringify({"var1":"LJ2", "var2":"Univarsity"})
        console.log(obj2);
        console.log(obj2.var1);
    </script>
</head>
</html>
<!-- 
JSON.parse()
Javascript String => Javascript Object
JSON.stringify()
Javascript Object => Javascript String
-->
