<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        let student={
            name:"priya",
            age:22,
            city:"Ahmedabad"
        }
        console.log(student);
        student.age=25
        console.log(student);
        student["city"]="surat";
        console.log(student);
        let key= "name";
        student[key]="riya";
        console.log(student);
    </script>
</head>
</html>
<!-- 
Dot Notation => obj.key=new value
Bracket Notation=> obj["key"]=new value
Using variable key=> obj[variable]=new value
-->
