write 1 JSON string with date property yyyy-mm-dd and print date in indian standard time 
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        const obj= JSON.parse('{"dob": "1997-03-14"}')
        a=new Date(obj.dob)
        console.log(a);
        
    </script>
</head>
</html>
